name: iOS Release

on:
  push:
    tags:
      - 'v*'   # trigger on version tags, e.g. v1.2.3
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  build-and-submit:
    name: Build & Submit iOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build and submit (production)
        if: github.event_name == 'push' || github.event.inputs.profile == 'production'
        working-directory: mobile
        run: npx eas-cli build --platform ios --profile production --auto-submit --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Build preview (manual dispatch)
        if: github.event.inputs.profile == 'preview'
        working-directory: mobile
        run: npx eas-cli build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
